<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bias PMTiles Viewer</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 14px;
        background: #101418;
        color: #fff;
      }
      .controls label {
        font-size: 14px;
      }
      .controls select {
        margin-left: 6px;
      }
      .controls input[type="range"] {
        vertical-align: middle;
      }
      #map {
        width: 100%;
        height: calc(100vh - 48px);
      }
      .status {
        margin-left: auto;
        font-size: 12px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>
        Model
        <select id="modelSelect"></select>
      </label>
      <label>
        Statistic
        <select id="statSelect"></select>
      </label>
      <label>
        Lead (days)
        <select id="leadSelect"></select>
      </label>
      <label>
        View
        <select id="modeSelect">
          <option value="both">Both</option>
          <option value="landmarks_only">Landmarks only</option>
          <option value="weather_only">Weather only</option>
        </select>
      </label>
      <label>
        Detail
        <select id="detailSelect">
          <option value="low">Low</option>
          <option value="high">High</option>
        </select>
      </label>
      <label>
        Weather opacity
        <input id="weatherOpacity" type="range" min="0" max="1" step="0.05" value="0.85" />
        <span id="weatherOpacityValue">0.85</span>
      </label>
      <label>
        Landmarks opacity
        <input id="landmarksOpacity" type="range" min="0" max="1" step="0.05" value="0.65" />
        <span id="landmarksOpacityValue">0.65</span>
      </label>
      <label>
        ZIP
        <input id="zipInput" type="text" placeholder="80302" size="8" />
      </label>
      <button id="zipGoButton" type="button">Go</button>
      <div class="status" id="status">Idle</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/pmtiles@3.2.0/dist/index.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
      const BASE_URL = "http://localhost:8080";
      const API_BASE_URL = "http://localhost:8001";
      const DEFAULT_MAPTILER_STYLE_ID = "streets-v2";
      const FALLBACK_STYLE_URL = "https://demotiles.maplibre.org/style.json";
      const DETAIL_ZOOM_LIMITS = { low: 9, high: 14 };
      const US_BOUNDS = [-125.0, 24.0, -66.0, 50.0]; // [west, south, east, north]
      const sourceId = "bias-source";
      const layerId = "bias-layer";
      const statusEl = document.getElementById("status");
      const appConfig = {
        models: [],             // [{key, label, lead_days_min, lead_days_max, lead_windows}]
        defaultModel: "gfs",
        maptilerApiKey: "",
        maptilerStyleId: DEFAULT_MAPTILER_STYLE_ID,
        statistics: {},         // { name: { tile_mode } }
        defaultStatistic: "bias",
        imageBounds: US_BOUNDS,
        forecastInitDate: {},   // { model_key: "YYYY-MM-DD" }
      };
      const state = {
        model: "gfs",
        statistic: "bias",
        mode: "both",
        detailMode: "low",
        weatherOpacity: 0.85,
        landmarksOpacity: 0.65,
      };
      let map = null;
      let landmarks = [];

      function mapStyleUrlFromConfig() {
        if (!appConfig.maptilerApiKey) {
          return FALLBACK_STYLE_URL;
        }
        return `https://api.maptiler.com/maps/${appConfig.maptilerStyleId}/style.json?key=${appConfig.maptilerApiKey}`;
      }

      function tilesetId(statistic, lead) {
        return `${statistic}/lead_${lead}`;
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function cacheLandmarkLayers() {
        if (!map) {
          return;
        }
        const style = map.getStyle();
        if (!style || !style.layers) {
          landmarks = [];
          return;
        }
        landmarks = style.layers
          .filter((layer) => layer.id !== layerId)
          .map((layer) => ({
            id: layer.id,
            type: layer.type,
            sourceLayer: layer["source-layer"] || "",
          }));
      }

      function isLowDetailHidden(layerInfo) {
        const text = `${layerInfo.id} ${layerInfo.sourceLayer}`.toLowerCase();
        const isSymbolLike =
          layerInfo.type === "symbol" || layerInfo.type === "line";
        if (!isSymbolLike) {
          return false;
        }
        return [
          "poi",
          "transit",
          "airport",
          "aeroway",
          "housenumber",
          "house_number",
          "address",
          "building",
          "minor_road",
          "path",
          "rail",
        ].some((keyword) => text.includes(keyword));
      }

      function setLayerVisibility(layerIdValue, visible) {
        if (!map) {
          return;
        }
        if (!map.getLayer(layerIdValue)) {
          return;
        }
        map.setLayoutProperty(layerIdValue, "visibility", visible ? "visible" : "none");
      }

      function setLandmarkOpacity(layerInfo, opacity) {
        if (!map) {
          return;
        }
        if (!map.getLayer(layerInfo.id)) {
          return;
        }
        const type = layerInfo.type;
        if (type === "fill") {
          map.setPaintProperty(layerInfo.id, "fill-opacity", opacity);
        } else if (type === "line") {
          map.setPaintProperty(layerInfo.id, "line-opacity", opacity);
        } else if (type === "symbol") {
          map.setPaintProperty(layerInfo.id, "icon-opacity", opacity);
          map.setPaintProperty(layerInfo.id, "text-opacity", opacity);
        } else if (type === "circle") {
          map.setPaintProperty(layerInfo.id, "circle-opacity", opacity);
        } else if (type === "raster") {
          map.setPaintProperty(layerInfo.id, "raster-opacity", opacity);
        } else if (type === "background") {
          map.setPaintProperty(layerInfo.id, "background-opacity", opacity);
        } else if (type === "fill-extrusion") {
          map.setPaintProperty(layerInfo.id, "fill-extrusion-opacity", opacity);
        } else if (type === "heatmap") {
          map.setPaintProperty(layerInfo.id, "heatmap-opacity", opacity);
        }
      }

      function applyLayerState() {
        if (!map) {
          return;
        }
        const zoomCap = DETAIL_ZOOM_LIMITS[state.detailMode];
        map.setMaxZoom(zoomCap);
        if (map.getZoom() > zoomCap) {
          map.setZoom(zoomCap);
        }

        const weatherVisible = state.mode !== "landmarks_only";
        if (map.getLayer(layerId)) {
          setLayerVisibility(layerId, weatherVisible);
          map.setPaintProperty(layerId, "raster-opacity", state.weatherOpacity);
        }

        const landmarksVisible = state.mode !== "weather_only";
        for (const landmark of landmarks) {
          const hideForLowDetail =
            state.detailMode === "low" && isLowDetailHidden(landmark);
          setLayerVisibility(landmark.id, landmarksVisible && !hideForLowDetail);
          setLandmarkOpacity(landmark, state.landmarksOpacity);
        }
      }

      function firstSymbolLayerId() {
        if (!map) {
          return undefined;
        }
        for (const landmark of landmarks) {
          if (landmark.type === "symbol" && map.getLayer(landmark.id)) {
            return landmark.id;
          }
        }
        return undefined;
      }

      function removeBiasLayer() {
        if (!map) return;
        if (map.getLayer(layerId)) map.removeLayer(layerId);
        if (map.getSource(sourceId)) map.removeSource(sourceId);
      }

      function addRasterLayer() {
        const weatherLayer = {
          id: layerId,
          type: "raster",
          source: sourceId,
          paint: { "raster-opacity": state.weatherOpacity },
        };
        const beforeId = firstSymbolLayerId();
        if (beforeId) {
          map.addLayer(weatherLayer, beforeId);
        } else {
          map.addLayer(weatherLayer);
        }
      }

      async function loadTilesetImage(statistic, lead) {
        const id = tilesetId(statistic, lead);
        const imageUrl = `${API_BASE_URL}/images/${state.model}/${statistic}/lead_${lead}.png`;
        setStatus(`Loading ${id} (image)...`);

        removeBiasLayer();

        const [west, south, east, north] = appConfig.imageBounds;
        map.addSource(sourceId, {
          type: "image",
          url: imageUrl,
          coordinates: [
            [west, north],
            [east, north],
            [east, south],
            [west, south],
          ],
        });
        addRasterLayer();
        applyLayerState();

        map.fitBounds(
          [[west, south], [east, north]],
          { padding: 20 }
        );
        setStatus(`Showing ${id}`);
      }

      async function loadTilesetPmtiles(statistic, lead) {
        const id = tilesetId(statistic, lead);
        const tilejsonUrl = `${BASE_URL}/${id}.json`;
        setStatus(`Loading ${id} (pmtiles)...`);

        removeBiasLayer();

        map.addSource(sourceId, {
          type: "raster",
          url: tilejsonUrl,
          tileSize: 256,
        });
        addRasterLayer();

        try {
          const resp = await fetch(tilejsonUrl);
          if (resp.ok) {
            const tilejson = await resp.json();
            if (typeof tilejson.minzoom === "number") {
              let center = null;
              if (tilejson.center && tilejson.center.length >= 2) {
                center = [tilejson.center[0], tilejson.center[1]];
              } else if (tilejson.bounds && tilejson.bounds.length >= 4) {
                center = [
                  (tilejson.bounds[0] + tilejson.bounds[2]) / 2,
                  (tilejson.bounds[1] + tilejson.bounds[3]) / 2,
                ];
              }
              if (center) {
                map.jumpTo({ center, zoom: tilejson.minzoom });
              } else {
                map.setZoom(tilejson.minzoom);
              }
            } else if (tilejson.center && tilejson.center.length >= 2) {
              map.easeTo({
                center: [tilejson.center[0], tilejson.center[1]],
              });
            } else if (tilejson.bounds) {
              map.fitBounds(
                [
                  [tilejson.bounds[0], tilejson.bounds[1]],
                  [tilejson.bounds[2], tilejson.bounds[3]],
                ],
                { padding: 20 }
              );
            }
          } else {
            setStatus(`Failed to load ${id} (${resp.status})`);
            return;
          }
        } catch (err) {
          console.error("TileJSON fetch failed", err);
          setStatus(`TileJSON fetch failed for ${id}`);
          return;
        }

        applyLayerState();
        setStatus(`Showing ${id}`);
      }

      async function loadTileset(statistic, lead) {
        if (!map) return;
        const statInfo = appConfig.statistics[statistic] || {};
        const tileMode = statInfo.tile_mode || "pmtiles";
        if (tileMode === "image") {
          await loadTilesetImage(statistic, lead);
        } else {
          await loadTilesetPmtiles(statistic, lead);
        }
      }

      function formatDate(d) {
        const mon = d.toLocaleString("en-US", { month: "short", timeZone: "UTC" });
        return `${mon} ${d.getUTCDate()}`;
      }

      function populateLeads(selectEl, options, statistic) {
        selectEl.innerHTML = "";
        const modelInitDate = appConfig.forecastInitDate[state.model] || null;
        const initDate = (statistic === "forecast" && modelInitDate)
          ? new Date(modelInitDate + "T12:00:00Z")
          : null;
        for (const option of options) {
          const opt = document.createElement("option");
          const key = option.key;
          opt.value = key;

          if (key.includes("_")) {
            // Window key like "1_7"
            const [start, end] = key.split("_").map(Number);
            let label = `${start}-${end} day avg`;
            if (initDate) {
              const d1 = new Date(initDate);
              d1.setUTCDate(d1.getUTCDate() + start);
              const d2 = new Date(initDate);
              d2.setUTCDate(d2.getUTCDate() + end);
              label += ` (${formatDate(d1)}-${formatDate(d2)})`;
            }
            opt.textContent = label;
          } else {
            // Single day key like "7"
            let label = key;
            if (initDate) {
              const d = new Date(initDate);
              d.setUTCDate(d.getUTCDate() + parseInt(key));
              label += ` (${formatDate(d)})`;
            }
            opt.textContent = label;
          }
          selectEl.appendChild(opt);
        }
      }

      function populateStatistics(selectEl, statistics) {
        selectEl.innerHTML = "";
        for (const statName of Object.keys(statistics).sort()) {
          const opt = document.createElement("option");
          opt.value = statName;
          opt.textContent = statName;
          selectEl.appendChild(opt);
        }
      }

      function populateModels(selectEl, models) {
        selectEl.innerHTML = "";
        for (const model of models) {
          const opt = document.createElement("option");
          opt.value = model.key;
          opt.textContent = model.label;
          selectEl.appendChild(opt);
        }
      }

      function buildLeadOptionsForModel(modelKey) {
        const model = appConfig.models.find(m => m.key === modelKey);
        if (!model) {
          return [{ key: "1" }];
        }
        const options = [];
        for (let i = model.lead_days_min; i <= model.lead_days_max; i++) {
          options.push({ key: String(i) });
        }
        const windows = model.lead_windows || [];
        for (const [start, end] of windows) {
          if (start >= model.lead_days_min && end <= model.lead_days_max) {
            options.push({ key: `${start}_${end}` });
          }
        }
        return options;
      }

      async function fetchAppConfig() {
        try {
          const resp = await fetch(`${API_BASE_URL}/api/config`);
          if (!resp.ok) {
            return;
          }
          const data = await resp.json();
          if (Array.isArray(data.models) && data.models.length > 0) {
            appConfig.models = data.models;
          }
          if (typeof data.default_model === "string") {
            appConfig.defaultModel = data.default_model;
          }
          if (typeof data.maptiler_api_key === "string") {
            appConfig.maptilerApiKey = data.maptiler_api_key;
          }
          if (typeof data.maptiler_style_id === "string" && data.maptiler_style_id.trim()) {
            appConfig.maptilerStyleId = data.maptiler_style_id.trim();
          }
          if (data.statistics && typeof data.statistics === "object" && !Array.isArray(data.statistics)) {
            appConfig.statistics = data.statistics;
          }
          if (
            typeof data.default_statistic === "string" &&
            data.default_statistic in appConfig.statistics
          ) {
            appConfig.defaultStatistic = data.default_statistic;
          }
          if (Array.isArray(data.image_bounds) && data.image_bounds.length === 4) {
            appConfig.imageBounds = data.image_bounds;
          }
          if (data.forecast_init_date && typeof data.forecast_init_date === "object") {
            appConfig.forecastInitDate = data.forecast_init_date;
          }
        } catch (err) {
          // Keep defaults when API config is unavailable.
        }
      }

      const modelSelect = document.getElementById("modelSelect");
      const statSelect = document.getElementById("statSelect");
      const leadSelect = document.getElementById("leadSelect");
      const modeSelect = document.getElementById("modeSelect");
      const detailSelect = document.getElementById("detailSelect");
      const weatherOpacityInput = document.getElementById("weatherOpacity");
      const landmarksOpacityInput = document.getElementById("landmarksOpacity");
      const weatherOpacityValue = document.getElementById("weatherOpacityValue");
      const landmarksOpacityValue = document.getElementById("landmarksOpacityValue");
      const zipInput = document.getElementById("zipInput");
      const zipGoButton = document.getElementById("zipGoButton");
      statSelect.value = state.statistic;
      modeSelect.value = state.mode;
      detailSelect.value = state.detailMode;
      weatherOpacityInput.value = String(state.weatherOpacity);
      landmarksOpacityInput.value = String(state.landmarksOpacity);
      weatherOpacityValue.textContent = weatherOpacityInput.value;
      landmarksOpacityValue.textContent = landmarksOpacityInput.value;

      function handleChange() {
        if (!map) {
          return;
        }
        loadTileset(state.statistic, leadSelect.value);
      }

      async function goToZip() {
        if (!map) {
          return;
        }
        const rawZip = zipInput.value.trim();
        if (!rawZip) {
          setStatus("Enter a ZIP code.");
          return;
        }
        setStatus(`Looking up ZIP ${rawZip}...`);
        const url = `${API_BASE_URL}/api/zip?zip=${encodeURIComponent(rawZip)}`;
        try {
          const resp = await fetch(url);
          if (!resp.ok) {
            setStatus(`ZIP lookup failed (${resp.status})`);
            return;
          }
          const data = await resp.json();
          if (!data.found) {
            setStatus(`ZIP not found: ${rawZip}`);
            return;
          }
          if (Array.isArray(data.bounds) && data.bounds.length === 4) {
            map.fitBounds(
              [
                [data.bounds[0], data.bounds[1]],
                [data.bounds[2], data.bounds[3]],
              ],
              { padding: 24, duration: 700 }
            );
          } else {
            map.flyTo({
              center: [data.lon, data.lat],
              zoom: 10,
              duration: 700,
            });
          }
          setStatus(`Centered on ZIP ${data.zip}`);
        } catch (err) {
          setStatus("ZIP lookup error");
        }
      }

      modelSelect.addEventListener("change", () => {
        state.model = modelSelect.value;
        const leadOpts = buildLeadOptionsForModel(state.model);
        populateLeads(leadSelect, leadOpts, state.statistic);
        leadSelect.value = leadOpts[0].key;
        handleChange();
      });
      statSelect.addEventListener("change", () => {
        state.statistic = statSelect.value;
        const leadOpts = buildLeadOptionsForModel(state.model);
        populateLeads(leadSelect, leadOpts, state.statistic);
        leadSelect.value = leadOpts[0].key;
        handleChange();
      });
      leadSelect.addEventListener("change", handleChange);
      modeSelect.addEventListener("change", () => {
        state.mode = modeSelect.value;
        applyLayerState();
      });
      detailSelect.addEventListener("change", () => {
        state.detailMode = detailSelect.value;
        applyLayerState();
      });
      weatherOpacityInput.addEventListener("input", () => {
        state.weatherOpacity = Number(weatherOpacityInput.value);
        weatherOpacityValue.textContent = weatherOpacityInput.value;
        applyLayerState();
      });
      landmarksOpacityInput.addEventListener("input", () => {
        state.landmarksOpacity = Number(landmarksOpacityInput.value);
        landmarksOpacityValue.textContent = landmarksOpacityInput.value;
        applyLayerState();
      });
      zipGoButton.addEventListener("click", () => {
        goToZip();
      });
      zipInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          goToZip();
        }
      });

      const popup = new maplibregl.Popup({ closeButton: true });

      function bindMapEvents() {
        map.on("load", async () => {
          cacheLandmarkLayers();
          if (!appConfig.maptilerApiKey) {
            setStatus("Using fallback basemap; set MAPTILER_API_KEY in backend env to enable MapTiler.");
          }
          // Populate model dropdown.
          populateModels(modelSelect, appConfig.models);
          state.model = appConfig.defaultModel;
          modelSelect.value = state.model;

          populateStatistics(statSelect, appConfig.statistics);
          state.statistic = appConfig.defaultStatistic;
          statSelect.value = state.statistic;

          const leadOpts = buildLeadOptionsForModel(state.model);
          populateLeads(leadSelect, leadOpts, state.statistic);
          leadSelect.value = leadOpts[0].key;
          handleChange();
        });

        map.on("click", async (event) => {
          const { lng, lat } = event.lngLat;
          const lead = leadSelect.value;
          const url = `${API_BASE_URL}/api/stats?model=${encodeURIComponent(state.model)}&lead=${encodeURIComponent(lead)}&lat=${lat}&lon=${lng}`;
          let text = "Loading...";
          try {
            const resp = await fetch(url);
            if (!resp.ok) {
              text = `Query failed (${resp.status})`;
            } else {
              const data = await resp.json();
              const stats = data.stats || {};
              const entries = Object.entries(stats);
              if (entries.length === 0) {
                text = "No data";
              } else {
                const lines = entries.map(([name, stat]) => {
                  if (stat.no_data || stat.value === null) {
                    return `${name}: No data`;
                  }
                  return `${name}: ${Number(stat.value).toFixed(2)} ${stat.units}`;
                });
                text = lines.join("<br />");
              }
            }
          } catch (err) {
            text = "Query error";
          }
          popup.setLngLat([lng, lat]).setHTML(text).addTo(map);
        });
      }

      async function initMap() {
        await fetchAppConfig();
        map = new maplibregl.Map({
          container: "map",
          style: mapStyleUrlFromConfig(),
          center: [-98.5, 39.8],
          zoom: 3,
        });
        bindMapEvents();
      }

      initMap();
    </script>
  </body>
</html>
