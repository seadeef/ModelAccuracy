<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bias PMTiles Viewer</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 14px;
        background: #101418;
        color: #fff;
      }
      .controls label {
        font-size: 14px;
      }
      .controls select {
        margin-left: 6px;
      }
      .controls input[type="range"] {
        vertical-align: middle;
      }
      #map {
        width: 100%;
        height: calc(100vh - 48px);
      }
      .status {
        margin-left: auto;
        font-size: 12px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>
        Lead (days)
        <select id="leadSelect"></select>
      </label>
      <label>
        View
        <select id="modeSelect">
          <option value="both">Both</option>
          <option value="landmarks_only">Landmarks only</option>
          <option value="weather_only">Weather only</option>
        </select>
      </label>
      <label>
        Detail
        <select id="detailSelect">
          <option value="low">Low</option>
          <option value="high">High</option>
        </select>
      </label>
      <label>
        Weather opacity
        <input id="weatherOpacity" type="range" min="0" max="1" step="0.05" value="0.85" />
        <span id="weatherOpacityValue">0.85</span>
      </label>
      <label>
        Landmarks opacity
        <input id="landmarksOpacity" type="range" min="0" max="1" step="0.05" value="0.65" />
        <span id="landmarksOpacityValue">0.65</span>
      </label>
      <label>
        ZIP
        <input id="zipInput" type="text" placeholder="80302" size="8" />
      </label>
      <button id="zipGoButton" type="button">Go</button>
      <div class="status" id="status">Idle</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/pmtiles@3.2.0/dist/index.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
      const BASE_URL = "http://localhost:8080";
      const API_BASE_URL = "http://localhost:8001";
      const DEFAULT_MAPTILER_STYLE_ID = "streets-v2";
      const FALLBACK_STYLE_URL = "https://demotiles.maplibre.org/style.json";
      const DETAIL_ZOOM_LIMITS = { low: 9, high: 14 };
      const sourceId = "bias-source";
      const layerId = "bias-layer";
      const statusEl = document.getElementById("status");
      const appConfig = {
        leadDaysMin: 1,
        leadDaysMax: 14,
        maptilerApiKey: "",
        maptilerStyleId: DEFAULT_MAPTILER_STYLE_ID,
      };
      const state = {
        mode: "both",
        detailMode: "low",
        weatherOpacity: 0.85,
        landmarksOpacity: 0.65,
      };
      let map = null;
      let landmarks = [];

      function mapStyleUrlFromConfig() {
        if (!appConfig.maptilerApiKey) {
          return FALLBACK_STYLE_URL;
        }
        return `https://api.maptiler.com/maps/${appConfig.maptilerStyleId}/style.json?key=${appConfig.maptilerApiKey}`;
      }

      function tilesetId(lead) {
        return `lead_${lead}`;
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function cacheLandmarkLayers() {
        if (!map) {
          return;
        }
        const style = map.getStyle();
        if (!style || !style.layers) {
          landmarks = [];
          return;
        }
        landmarks = style.layers
          .filter((layer) => layer.id !== layerId)
          .map((layer) => ({
            id: layer.id,
            type: layer.type,
            sourceLayer: layer["source-layer"] || "",
          }));
      }

      function isLowDetailHidden(layerInfo) {
        const text = `${layerInfo.id} ${layerInfo.sourceLayer}`.toLowerCase();
        const isSymbolLike =
          layerInfo.type === "symbol" || layerInfo.type === "line";
        if (!isSymbolLike) {
          return false;
        }
        return [
          "poi",
          "transit",
          "airport",
          "aeroway",
          "housenumber",
          "house_number",
          "address",
          "building",
          "minor_road",
          "path",
          "rail",
        ].some((keyword) => text.includes(keyword));
      }

      function setLayerVisibility(layerIdValue, visible) {
        if (!map) {
          return;
        }
        if (!map.getLayer(layerIdValue)) {
          return;
        }
        map.setLayoutProperty(layerIdValue, "visibility", visible ? "visible" : "none");
      }

      function setLandmarkOpacity(layerInfo, opacity) {
        if (!map) {
          return;
        }
        if (!map.getLayer(layerInfo.id)) {
          return;
        }
        const type = layerInfo.type;
        if (type === "fill") {
          map.setPaintProperty(layerInfo.id, "fill-opacity", opacity);
        } else if (type === "line") {
          map.setPaintProperty(layerInfo.id, "line-opacity", opacity);
        } else if (type === "symbol") {
          map.setPaintProperty(layerInfo.id, "icon-opacity", opacity);
          map.setPaintProperty(layerInfo.id, "text-opacity", opacity);
        } else if (type === "circle") {
          map.setPaintProperty(layerInfo.id, "circle-opacity", opacity);
        } else if (type === "raster") {
          map.setPaintProperty(layerInfo.id, "raster-opacity", opacity);
        } else if (type === "background") {
          map.setPaintProperty(layerInfo.id, "background-opacity", opacity);
        } else if (type === "fill-extrusion") {
          map.setPaintProperty(layerInfo.id, "fill-extrusion-opacity", opacity);
        } else if (type === "heatmap") {
          map.setPaintProperty(layerInfo.id, "heatmap-opacity", opacity);
        }
      }

      function applyLayerState() {
        if (!map) {
          return;
        }
        const zoomCap = DETAIL_ZOOM_LIMITS[state.detailMode];
        map.setMaxZoom(zoomCap);
        if (map.getZoom() > zoomCap) {
          map.setZoom(zoomCap);
        }

        const weatherVisible = state.mode !== "landmarks_only";
        if (map.getLayer(layerId)) {
          setLayerVisibility(layerId, weatherVisible);
          map.setPaintProperty(layerId, "raster-opacity", state.weatherOpacity);
        }

        const landmarksVisible = state.mode !== "weather_only";
        for (const landmark of landmarks) {
          const hideForLowDetail =
            state.detailMode === "low" && isLowDetailHidden(landmark);
          setLayerVisibility(landmark.id, landmarksVisible && !hideForLowDetail);
          setLandmarkOpacity(landmark, state.landmarksOpacity);
        }
      }

      function firstSymbolLayerId() {
        if (!map) {
          return undefined;
        }
        for (const landmark of landmarks) {
          if (landmark.type === "symbol" && map.getLayer(landmark.id)) {
            return landmark.id;
          }
        }
        return undefined;
      }

      async function loadTileset(lead) {
        if (!map) {
          return;
        }
        const id = tilesetId(lead);
        const tilejsonUrl = `${BASE_URL}/${id}.json`;
        setStatus(`Loading ${id}...`);

        if (map.getLayer(layerId)) {
          map.removeLayer(layerId);
        }
        if (map.getSource(sourceId)) {
          map.removeSource(sourceId);
        }

        map.addSource(sourceId, {
          type: "raster",
          url: tilejsonUrl,
          tileSize: 256,
        });
        const weatherLayer = {
          id: layerId,
          type: "raster",
          source: sourceId,
          paint: {
            "raster-opacity": state.weatherOpacity,
          },
        };
        const beforeId = firstSymbolLayerId();
        if (beforeId) {
          map.addLayer(weatherLayer, beforeId);
        } else {
          map.addLayer(weatherLayer);
        }

        try {
          const resp = await fetch(tilejsonUrl);
          if (resp.ok) {
            const tilejson = await resp.json();
            if (typeof tilejson.minzoom === "number") {
              let center = null;
              if (tilejson.center && tilejson.center.length >= 2) {
                center = [tilejson.center[0], tilejson.center[1]];
              } else if (tilejson.bounds && tilejson.bounds.length >= 4) {
                center = [
                  (tilejson.bounds[0] + tilejson.bounds[2]) / 2,
                  (tilejson.bounds[1] + tilejson.bounds[3]) / 2,
                ];
              }
              if (center) {
                map.jumpTo({ center, zoom: tilejson.minzoom });
              } else {
                map.setZoom(tilejson.minzoom);
              }
            } else if (tilejson.center && tilejson.center.length >= 2) {
              map.easeTo({
                center: [tilejson.center[0], tilejson.center[1]],
              });
            } else if (tilejson.bounds) {
              map.fitBounds(
                [
                  [tilejson.bounds[0], tilejson.bounds[1]],
                  [tilejson.bounds[2], tilejson.bounds[3]],
                ],
                { padding: 20 }
              );
            }
          } else {
            setStatus(`Failed to load ${id} (${resp.status})`);
            return;
          }
        } catch (err) {
          console.error("TileJSON fetch failed", err);
          setStatus(`TileJSON fetch failed for ${id}`);
          return;
        }

        applyLayerState();
        setStatus(`Showing ${id}`);
      }

      function populateLeads(selectEl, minLead, maxLead) {
        selectEl.innerHTML = "";
        for (let i = minLead; i <= maxLead; i += 1) {
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = String(i);
          selectEl.appendChild(opt);
        }
      }

      async function fetchAppConfig() {
        try {
          const resp = await fetch(`${API_BASE_URL}/api/config`);
          if (!resp.ok) {
            return;
          }
          const data = await resp.json();
          if (typeof data.lead_days_min === "number") {
            appConfig.leadDaysMin = data.lead_days_min;
          }
          if (typeof data.lead_days_max === "number") {
            appConfig.leadDaysMax = data.lead_days_max;
          }
          if (appConfig.leadDaysMin > appConfig.leadDaysMax) {
            appConfig.leadDaysMin = 1;
            appConfig.leadDaysMax = 14;
          }
          if (typeof data.maptiler_api_key === "string") {
            appConfig.maptilerApiKey = data.maptiler_api_key;
          }
          if (typeof data.maptiler_style_id === "string" && data.maptiler_style_id.trim()) {
            appConfig.maptilerStyleId = data.maptiler_style_id.trim();
          }
        } catch (err) {
          // Keep defaults when API config is unavailable.
        }
      }

      const leadSelect = document.getElementById("leadSelect");
      const modeSelect = document.getElementById("modeSelect");
      const detailSelect = document.getElementById("detailSelect");
      const weatherOpacityInput = document.getElementById("weatherOpacity");
      const landmarksOpacityInput = document.getElementById("landmarksOpacity");
      const weatherOpacityValue = document.getElementById("weatherOpacityValue");
      const landmarksOpacityValue = document.getElementById("landmarksOpacityValue");
      const zipInput = document.getElementById("zipInput");
      const zipGoButton = document.getElementById("zipGoButton");
      modeSelect.value = state.mode;
      detailSelect.value = state.detailMode;
      weatherOpacityInput.value = String(state.weatherOpacity);
      landmarksOpacityInput.value = String(state.landmarksOpacity);
      weatherOpacityValue.textContent = weatherOpacityInput.value;
      landmarksOpacityValue.textContent = landmarksOpacityInput.value;

      function handleChange() {
        if (!map) {
          return;
        }
        loadTileset(Number(leadSelect.value));
      }

      async function goToZip() {
        if (!map) {
          return;
        }
        const rawZip = zipInput.value.trim();
        if (!rawZip) {
          setStatus("Enter a ZIP code.");
          return;
        }
        setStatus(`Looking up ZIP ${rawZip}...`);
        const url = `${API_BASE_URL}/api/zip?zip=${encodeURIComponent(rawZip)}`;
        try {
          const resp = await fetch(url);
          if (!resp.ok) {
            setStatus(`ZIP lookup failed (${resp.status})`);
            return;
          }
          const data = await resp.json();
          if (!data.found) {
            setStatus(`ZIP not found: ${rawZip}`);
            return;
          }
          if (Array.isArray(data.bounds) && data.bounds.length === 4) {
            map.fitBounds(
              [
                [data.bounds[0], data.bounds[1]],
                [data.bounds[2], data.bounds[3]],
              ],
              { padding: 24, duration: 700 }
            );
          } else {
            map.flyTo({
              center: [data.lon, data.lat],
              zoom: 10,
              duration: 700,
            });
          }
          setStatus(`Centered on ZIP ${data.zip}`);
        } catch (err) {
          setStatus("ZIP lookup error");
        }
      }

      leadSelect.addEventListener("change", handleChange);
      modeSelect.addEventListener("change", () => {
        state.mode = modeSelect.value;
        applyLayerState();
      });
      detailSelect.addEventListener("change", () => {
        state.detailMode = detailSelect.value;
        applyLayerState();
      });
      weatherOpacityInput.addEventListener("input", () => {
        state.weatherOpacity = Number(weatherOpacityInput.value);
        weatherOpacityValue.textContent = weatherOpacityInput.value;
        applyLayerState();
      });
      landmarksOpacityInput.addEventListener("input", () => {
        state.landmarksOpacity = Number(landmarksOpacityInput.value);
        landmarksOpacityValue.textContent = landmarksOpacityInput.value;
        applyLayerState();
      });
      zipGoButton.addEventListener("click", () => {
        goToZip();
      });
      zipInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          goToZip();
        }
      });

      const popup = new maplibregl.Popup({ closeButton: true });

      function bindMapEvents() {
        map.on("load", async () => {
          cacheLandmarkLayers();
          if (!appConfig.maptilerApiKey) {
            setStatus("Using fallback basemap; set MAPTILER_API_KEY in backend env to enable MapTiler.");
          }
          populateLeads(leadSelect, appConfig.leadDaysMin, appConfig.leadDaysMax);
          leadSelect.value = String(appConfig.leadDaysMin);
          handleChange();
        });

        map.on("click", async (event) => {
          const { lng, lat } = event.lngLat;
          const lead = Number(leadSelect.value);
          const url = `${API_BASE_URL}/api/bias?lead=${lead}&lat=${lat}&lon=${lng}`;
          let text = "Loading...";
          try {
            const resp = await fetch(url);
            if (!resp.ok) {
              text = `Query failed (${resp.status})`;
            } else {
              const data = await resp.json();
              if (data.no_data) {
                text = "No data";
              } else {
                text = `${data.value.toFixed(2)} mm`;
              }
            }
          } catch (err) {
            text = "Query error";
          }
          popup.setLngLat([lng, lat]).setHTML(text).addTo(map);
        });
      }

      async function initMap() {
        await fetchAppConfig();
        map = new maplibregl.Map({
          container: "map",
          style: mapStyleUrlFromConfig(),
          center: [-98.5, 39.8],
          zoom: 3,
        });
        bindMapEvents();
      }

      initMap();
    </script>
  </body>
</html>
